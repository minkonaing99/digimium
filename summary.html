<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

</head>

<body>
    <header id="navbar">
        <div class="logo" aria-label="Home"><a href="#"><img src="./assets/logo_digimium.png" alt=""></a></div>
        <nav>
            <div class="nav-links" id="navLinks">
                <a href="./index.html" aria-label="Home">Home</a>
                <a href="./summary.html" aria-label="Summary">Summary</a>
                <button class="contact-btn" onclick="window.location.href='#contact'" aria-label="Contact Us">Log
                    Out</button>
            </div>
            <div class="burger" id="burger" onclick="toggleMenu()" aria-label="Menu Toggle">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </nav>

    </header>
    <div class="container-fluid">
        <section class="menu-bar py-2">
            <div class="row d-flex justify-content-between align-items-center">
                <div class="col text-start">
                    <h1>Summary</h1>
                </div>
                <div class="col text-end">
                    <button class="contact-btn menu-btn" id="editBtn">Admin</button>
                </div>
            </div>
        </section>


    </div>



    <script>
        function toggleMenu() {
            const burger = document.getElementById("burger");
            const navLinks = document.getElementById("navLinks");

            burger.classList.toggle("open");
            navLinks.classList.toggle("active");
        }

        document.querySelectorAll('#navLinks a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById("navLinks").classList.remove("active");
                document.getElementById("burger").classList.remove("open");
            });
        });
        document.getElementById('addBtn').addEventListener('click', function () {
            const inputRow = document.getElementById('inputRow');
            inputRow.style.display = inputRow.style.display === 'none' ? 'block' : 'none';
        });
    </script>




</body>

</html>
