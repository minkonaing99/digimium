<VirtualHost *:80>
    ServerName digimium.store
    ServerAlias www.digimium.store
    DocumentRoot /var/www/digimium.store

    <Directory /var/www/digimium.store>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/digimium_store_error.log
    CustomLog ${APACHE_LOG_DIR}/digimium_store_access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName digimium.store
    ServerAlias www.digimium.store
    DocumentRoot /var/www/digimium.store

    <Directory /var/www/digimium.store>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/digimium.store/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/digimium.store/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog ${APACHE_LOG_DIR}/digimium_store_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/digimium_store_ssl_access.log combined
</VirtualHost>
</IfModule>
