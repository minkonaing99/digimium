<VirtualHost *:80>
    ServerName admin.digimium.store
    DocumentRoot /var/www/admin.digimium.store

    <Directory /var/www/admin.digimium.store>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/admin_digimium_error.log
    CustomLog ${APACHE_LOG_DIR}/admin_digimium_access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName admin.digimium.store
    DocumentRoot /var/www/admin.digimium.store

    <Directory /var/www/admin.digimium.store>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/admin.digimium.store/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/admin.digimium.store/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog ${APACHE_LOG_DIR}/admin_digimium_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/admin_digimium_ssl_access.log combined
</VirtualHost>
</IfModule>
